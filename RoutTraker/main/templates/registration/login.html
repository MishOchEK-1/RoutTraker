<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход | RoutTraker</title>
    <style>
        :root {
            --bg: #f5efe4;
            --card: rgba(255, 251, 245, 0.92);
            --ink: #1f2a1e;
            --muted: #6a7361;
            --line: rgba(64, 75, 56, 0.16);
            --accent: #274f3a;
            --error: #a8442a;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 18px;
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.78), transparent 28%),
                linear-gradient(160deg, var(--bg) 0%, #efe5d2 100%);
        }

        .card {
            width: min(460px, 100%);
            padding: 28px;
            border-radius: 28px;
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.55);
            box-shadow: 0 24px 60px rgba(79, 58, 26, 0.14);
        }

        .eyebrow {
            margin: 0 0 8px;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-size: 12px;
            color: #8d7042;
        }

        h1 {
            margin: 0 0 10px;
            font-family: "Fraunces", Georgia, serif;
            font-size: 2.2rem;
        }

        .subtitle {
            margin: 0 0 20px;
            color: var(--muted);
            line-height: 1.6;
        }

        form {
            display: grid;
            gap: 14px;
        }

        label {
            display: grid;
            gap: 8px;
            font-weight: 600;
        }

        input {
            min-height: 48px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.82);
            padding: 0 14px;
            font: inherit;
        }

        button {
            min-height: 48px;
            border: none;
            border-radius: 999px;
            background: var(--accent);
            color: #fff;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
        }

        .errorlist,
        .errornote {
            margin: 0;
            padding: 12px 14px;
            border-radius: 14px;
            list-style: none;
            background: rgba(168, 68, 42, 0.1);
            color: var(--error);
        }
    </style>
</head>
<body>
    <main class="card">
        <p class="eyebrow">RoutTraker</p>
        <h1>Вход в чеклист</h1>
        <p class="subtitle">
            Авторизация нужна, чтобы было видно, кто именно менял статус и комментарии.
        </p>

        {% if form.errors %}
            <div class="errornote">Не удалось войти. Проверь логин и пароль.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label>
                <span>Логин</span>
                {{ form.username }}
            </label>
            <label>
                <span>Пароль</span>
                {{ form.password }}
            </label>
            <button type="submit">Войти</button>
        </form>
    </main>
</body>
</html>
